<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações — Cardápio Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }

    /* ── Nav ── */
    nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 20px; position: relative; }
    nav .logo { font-size: 1.4rem; font-weight: 700; color: #58a6ff; }
    .nav-toggle { display: none; background: none; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; padding: 6px 11px; cursor: pointer; font-size: 1.2rem; line-height: 1; margin-left: auto; }
    .nav-menu { display: flex; align-items: center; gap: 20px; margin-left: auto; }
    .nav-menu a { color: #8b949e; text-decoration: none; font-size: 0.9rem; }
    .nav-menu a:hover, .nav-menu a.active { color: #e6edf3; }
    .nav-menu .nav-btn { background: none; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; padding: 6px 12px; cursor: pointer; font-size: 0.9rem; }

    /* ── Content ── */
    .content { max-width: 700px; margin: 32px auto; padding: 0 16px; }
    h2 { margin-bottom: 24px; }
    .section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .section h3 { font-size: 0.9rem; color: #58a6ff; text-transform: uppercase; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 5px; }
    .form-group input, .form-group textarea { width: 100%; padding: 9px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 16px; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #58a6ff; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-save { background: #238636; border: none; border-radius: 6px; color: #fff; padding: 12px 24px; cursor: pointer; font-size: 0.95rem; font-weight: 600; width: 100%; }
    .btn-save:hover { background: #2ea043; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #238636; color: #fff; padding: 12px 20px; border-radius: 8px; display: none; z-index: 999; }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      nav { padding: 12px 16px; }
      .nav-toggle { display: block; }
      .nav-menu { display: none; flex-direction: column; align-items: stretch; gap: 0; position: absolute; top: 100%; left: 0; right: 0; background: #161b22; border-bottom: 2px solid #30363d; z-index: 999; margin: 0; padding: 4px 0; }
      .nav-menu.open { display: flex; }
      .nav-menu a, .nav-menu .nav-btn { display: block; padding: 14px 20px; color: #8b949e; font-size: 1rem; border: none; border-bottom: 1px solid #21262d; text-decoration: none; text-align: left; background: none; cursor: pointer; width: 100%; }
      .nav-menu a.active { color: #e6edf3; background: #21262d; }
      .content { margin: 16px auto; padding: 0 12px; }
      .section { padding: 16px; }
      .form-row { grid-template-columns: 1fr; }
      .toast { bottom: 16px; left: 12px; right: 12px; text-align: center; }
    }
  </style>
</head>
<body>
  <nav>
    <span class="logo">🍴 Cardápio Bot</span>
    <button class="nav-toggle" onclick="document.getElementById('nav-menu').classList.toggle('open')">☰</button>
    <div class="nav-menu" id="nav-menu">
      <a href="/dashboard.html">Pedidos</a>
      <a href="/menu.html">Cardápio</a>
      <a href="/settings.html" class="active">Configurações</a>
      <button class="nav-btn" onclick="logout()">Sair</button>
    </div>
  </nav>

  <div class="content">
    <h2>Configurações</h2>

    <div class="section">
      <h3>Estabelecimento</h3>
      <div class="form-group"><label>Nome do estabelecimento</label><input id="business_name" placeholder="Ex: Lanchonete do João"></div>
      <div class="form-group"><label>Mensagem de boas-vindas</label><textarea id="welcome_message" rows="2"></textarea></div>
      <div class="form-group"><label>Mensagem quando fechado</label><textarea id="closed_message" rows="2" placeholder="Use {open} para horário de abertura"></textarea></div>
    </div>

    <div class="section">
      <h3>Horário de Funcionamento</h3>
      <div class="form-row">
        <div class="form-group"><label>Abre às</label><input id="business_hours_open" type="time"></div>
        <div class="form-group"><label>Fecha às</label><input id="business_hours_close" type="time"></div>
      </div>
    </div>

    <div class="section">
      <h3>Entrega</h3>
      <div class="form-row">
        <div class="form-group"><label>Taxa de entrega (R$)</label><input id="delivery_fee" type="number" step="0.01" min="0"></div>
        <div class="form-group"><label>Pedido mínimo (R$)</label><input id="min_order" type="number" step="0.01" min="0"></div>
      </div>
      <div class="form-group"><label>Tempo estimado de entrega</label><input id="estimated_time" placeholder="Ex: 40-60 minutos"></div>
    </div>

    <div class="section">
      <h3>Pagamento PIX</h3>
      <div class="form-group"><label>Chave PIX (informativa)</label><input id="pix_key" placeholder="CPF, CNPJ, e-mail ou chave aleatória"></div>
    </div>

    <div class="section">
      <h3>Notificações</h3>
      <div class="form-group"><label>Número WhatsApp do admin (para receber alertas)</label><input id="admin_whatsapp" placeholder="Ex: 5511999999999 (só números, com DDI)"></div>
    </div>

    <button class="btn-save" onclick="saveSettings()">Salvar configurações</button>
  </div>

  <div class="toast" id="toast">✅ Configurações salvas!</div>

  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) location.href = '/';
    const h = () => ({ 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' });

    const fields = ['business_name','welcome_message','closed_message','business_hours_open','business_hours_close','delivery_fee','min_order','estimated_time','pix_key','admin_whatsapp'];

    async function loadSettings() {
      const res = await fetch('/api/admin/settings', { headers: h() });
      const settings = await res.json();
      fields.forEach(k => { if (document.getElementById(k)) document.getElementById(k).value = settings[k] || ''; });
    }

    async function saveSettings() {
      const updates = {};
      fields.forEach(k => { if (document.getElementById(k)) updates[k] = document.getElementById(k).value; });
      await fetch('/api/admin/settings', { method: 'PUT', headers: h(), body: JSON.stringify(updates) });
      const t = document.getElementById('toast');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    function logout() { localStorage.removeItem('admin_token'); location.href = '/'; }

    loadSettings();
  </script>
</body>
</html>
