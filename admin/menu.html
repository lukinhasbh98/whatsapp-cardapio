<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardápio — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }

    /* ── Nav ── */
    nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 20px; position: relative; }
    nav .logo { font-size: 1.4rem; font-weight: 700; color: #58a6ff; }
    .nav-toggle { display: none; background: none; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; padding: 6px 11px; cursor: pointer; font-size: 1.2rem; line-height: 1; margin-left: auto; }
    .nav-menu { display: flex; align-items: center; gap: 20px; margin-left: auto; }
    .nav-menu a { color: #8b949e; text-decoration: none; font-size: 0.9rem; }
    .nav-menu a:hover, .nav-menu a.active { color: #e6edf3; }
    .nav-menu .nav-btn { background: none; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; padding: 6px 12px; cursor: pointer; font-size: 0.9rem; }

    /* ── Layout ── */
    .main { display: grid; grid-template-columns: 260px 1fr; gap: 0; min-height: calc(100vh - 53px); }

    /* ── Sidebar ── */
    .sidebar { background: #161b22; border-right: 1px solid #30363d; padding: 16px; }
    .sidebar h3 { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; margin-bottom: 12px; }
    .cat-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .cat-item:hover, .cat-item.active { background: #21262d; }
    .cat-item .name { font-size: 0.9rem; }
    .cat-item .actions { display: flex; gap: 6px; opacity: 0; }
    .cat-item:hover .actions { opacity: 1; }
    .cat-item .actions button { background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 4px; }
    .btn-add-cat { width: 100%; padding: 10px; background: none; border: 1px dashed #30363d; border-radius: 6px; color: #8b949e; cursor: pointer; margin-top: 8px; font-size: 0.9rem; }
    .btn-add-cat:hover { border-color: #58a6ff; color: #58a6ff; }

    /* ── Content ── */
    .content { padding: 24px; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
    .content-header h2 { font-size: 1.2rem; }
    .btn-primary { background: #238636; border: none; border-radius: 6px; color: #fff; padding: 10px 16px; cursor: pointer; font-size: 0.9rem; font-weight: 600; white-space: nowrap; }
    .btn-primary:hover { background: #2ea043; }
    .btn-cat-toggle { display: none; background: none; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; padding: 8px 12px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }

    /* ── Items grid ── */
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .item-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
    .item-card img { width: 100%; height: 140px; object-fit: cover; background: #21262d; }
    .item-card .no-img { width: 100%; height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2rem; background: #21262d; }
    .item-body { padding: 12px; }
    .item-name { font-weight: 600; margin-bottom: 4px; }
    .item-desc { font-size: 0.8rem; color: #8b949e; margin-bottom: 8px; }
    .item-price { font-size: 1rem; color: #3fb950; font-weight: 700; }
    .days-badge { font-size: 0.72rem; color: #8b949e; margin-top: 4px; }
    .item-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .toggle { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #8b949e; }
    .item-actions { display: flex; gap: 6px; }
    .item-actions button { background: none; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; padding: 6px 10px; cursor: pointer; font-size: 0.8rem; }
    .item-actions button:hover { color: #e6edf3; border-color: #58a6ff; }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .overlay.open { display: flex; }
    .modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .modal h3 { margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 5px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 16px; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #58a6ff; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .btn-cancel-modal { background: none; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; padding: 10px 16px; cursor: pointer; font-size: 0.9rem; }
    .extras-list { margin-top: 12px; }
    .extra-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; font-size: 0.85rem; }
    .extra-row span { flex: 1; }
    .extra-row button { background: none; border: none; color: #f85149; cursor: pointer; padding: 4px 8px; font-size: 1rem; }
    .days-checks { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .days-checks label { display: flex; align-items: center; gap: 4px; padding: 6px 12px; border: 1px solid #30363d; border-radius: 20px; cursor: pointer; font-size: 0.82rem; color: #8b949e; }
    .days-checks input[type=checkbox] { display: none; }
    .days-checks label:has(input:checked) { border-color: #58a6ff; background: #0d2137; color: #58a6ff; font-weight: 600; }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      nav { padding: 12px 16px; }
      .nav-toggle { display: block; }
      .nav-menu { display: none; flex-direction: column; align-items: stretch; gap: 0; position: absolute; top: 100%; left: 0; right: 0; background: #161b22; border-bottom: 2px solid #30363d; z-index: 999; margin: 0; padding: 4px 0; }
      .nav-menu.open { display: flex; }
      .nav-menu a, .nav-menu .nav-btn { display: block; padding: 14px 20px; color: #8b949e; font-size: 1rem; border: none; border-bottom: 1px solid #21262d; text-decoration: none; text-align: left; background: none; cursor: pointer; width: 100%; }
      .nav-menu a.active { color: #e6edf3; background: #21262d; }

      .main { grid-template-columns: 1fr; }

      .sidebar { display: none; border-right: none; border-bottom: 1px solid #30363d; padding: 12px 16px; }
      .sidebar.open { display: block; }

      .btn-cat-toggle { display: inline-flex; align-items: center; gap: 6px; }

      .content { padding: 16px; }
      .content-header { flex-wrap: wrap; }

      .items-grid { grid-template-columns: 1fr; gap: 12px; }
      .item-card .no-img { height: 70px; }

      .item-actions button { padding: 8px 12px; font-size: 0.85rem; }

      .modal { padding: 20px 16px; max-height: 88vh; border-radius: 16px; }
      .modal-footer { flex-direction: column-reverse; }
      .modal-footer button { width: 100%; padding: 12px; font-size: 0.95rem; }

      .days-checks label { padding: 7px 12px; font-size: 0.85rem; }

      .cat-item .actions { opacity: 1; }
    }
  </style>
</head>
<body>
  <nav>
    <span class="logo">🍴 Cardápio Bot</span>
    <button class="nav-toggle" onclick="document.getElementById('nav-menu').classList.toggle('open')">☰</button>
    <div class="nav-menu" id="nav-menu">
      <a href="/dashboard.html">Pedidos</a>
      <a href="/menu.html" class="active">Cardápio</a>
      <a href="/settings.html">Configurações</a>
      <button class="nav-btn" onclick="logout()">Sair</button>
    </div>
  </nav>

  <div class="main">
    <div class="sidebar" id="sidebar">
      <h3>Categorias</h3>
      <div id="categories-list"></div>
      <button class="btn-add-cat" onclick="openCatModal()">+ Nova categoria</button>
    </div>
    <div class="content">
      <div class="content-header">
        <h2 id="cat-title">Selecione uma categoria</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-cat-toggle" onclick="toggleSidebar()">📂 Categorias</button>
          <button class="btn-primary" onclick="openItemModal()" id="btn-new-item" style="display:none">+ Novo item</button>
        </div>
      </div>
      <div class="items-grid" id="items-grid"></div>
    </div>
  </div>

  <!-- Item Modal -->
  <div class="overlay" id="item-modal">
    <div class="modal">
      <h3 id="item-modal-title">Novo Item</h3>
      <div class="form-group"><label>Nome</label><input id="item-name" placeholder="Ex: X-Burguer"></div>
      <div class="form-group"><label>Descrição</label><textarea id="item-desc" rows="2" placeholder="Descrição opcional"></textarea></div>
      <div class="form-group"><label>Preço (R$)</label><input id="item-price" type="number" step="0.01" min="0" placeholder="0.00" inputmode="decimal"></div>
      <div class="form-group"><label>Imagem (opcional)</label><input id="item-image" type="file" accept="image/*"></div>
      <div class="form-group">
        <label>Ativo</label>
        <select id="item-active"><option value="1">Sim</option><option value="0">Não</option></select>
      </div>
      <div class="form-group">
        <label>Disponível nos dias</label>
        <div class="days-checks" id="days-checks">
          <label><input type="checkbox" value="0"><span>Dom</span></label>
          <label><input type="checkbox" value="1"><span>Seg</span></label>
          <label><input type="checkbox" value="2"><span>Ter</span></label>
          <label><input type="checkbox" value="3"><span>Qua</span></label>
          <label><input type="checkbox" value="4"><span>Qui</span></label>
          <label><input type="checkbox" value="5"><span>Sex</span></label>
          <label><input type="checkbox" value="6"><span>Sáb</span></label>
        </div>
        <small style="color:#8b949e;font-size:0.75rem;margin-top:4px;display:block">Deixe todos desmarcados para disponível todos os dias</small>
      </div>
      <hr style="border-color:#30363d;margin:16px 0">
      <h4 style="margin-bottom:10px;font-size:0.9rem">Acréscimos disponíveis</h4>
      <div class="extras-list" id="extras-list"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="extra-name" placeholder="Nome do acréscimo" style="flex:1;padding:9px 10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:16px">
        <input id="extra-price" type="number" step="0.01" min="0" placeholder="R$" inputmode="decimal" style="width:80px;padding:9px 10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:16px">
        <button class="btn-primary" style="padding:9px 12px;font-size:0.85rem" onclick="addExtra()">+</button>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel-modal" onclick="closeItemModal()">Cancelar</button>
        <button class="btn-primary" onclick="saveItem()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Category Modal -->
  <div class="overlay" id="cat-modal">
    <div class="modal">
      <h3>Nova Categoria</h3>
      <div class="form-group"><label>Nome</label><input id="cat-name" placeholder="Ex: Pratos Principais"></div>
      <div class="form-group"><label>Emoji</label><input id="cat-emoji" placeholder="Ex: 🍽️" maxlength="4"></div>
      <div class="form-group"><label>Ordem</label><input id="cat-order" type="number" value="0" inputmode="numeric"></div>
      <div class="modal-footer">
        <button class="btn-cancel-modal" onclick="document.getElementById('cat-modal').classList.remove('open')">Cancelar</button>
        <button class="btn-primary" onclick="saveCategory()">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) location.href = '/';
    const h = (isForm) => isForm ? { 'Authorization': `Bearer ${token}` } : { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    const fmt = v => 'R$ ' + Number(v).toFixed(2).replace('.', ',');
    const DAY_NAMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const getDaysText = days => days.length ? days.map(d => DAY_NAMES[d]).join(', ') : 'Todos os dias';
    const getDaysChecked = () => Array.from(document.querySelectorAll('#days-checks input:checked')).map(cb => parseInt(cb.value));
    const setDaysChecked = days => document.querySelectorAll('#days-checks input').forEach(cb => { cb.checked = days.includes(parseInt(cb.value)); });

    let categories = [];
    let currentCatId = null;
    let editingItemId = null;
    let pendingExtras = [];

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    async function loadCategories() {
      const res = await fetch('/api/admin/categories', { headers: h() });
      categories = await res.json();
      const list = document.getElementById('categories-list');
      list.innerHTML = categories.map(c => `
        <div class="cat-item ${c.id==currentCatId?'active':''}" onclick="selectCat(${c.id},'${c.name} ${c.emoji}')">
          <span class="name">${c.emoji} ${c.name}</span>
          <div class="actions">
            <button onclick="event.stopPropagation();deleteCat(${c.id})">🗑️</button>
          </div>
        </div>`).join('');
    }

    async function selectCat(id, name) {
      currentCatId = id;
      document.getElementById('cat-title').textContent = name;
      document.getElementById('btn-new-item').style.display = 'block';
      if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
      loadCategories();
      const res = await fetch(`/api/admin/items?category_id=${id}`, { headers: h() });
      const items = await res.json();
      document.getElementById('items-grid').innerHTML = items.length
        ? items.map(item => {
            const days = JSON.parse(item.available_days || '[]');
            return `
          <div class="item-card">
            ${item.image_url ? `<img src="${item.image_url}">` : `<div class="no-img">🍽️</div>`}
            <div class="item-body">
              <div class="item-name">${item.name}</div>
              ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
              <div class="item-price">${fmt(item.price)}</div>
              <div class="days-badge">📅 ${getDaysText(days)}</div>
              <div class="item-footer">
                <span class="toggle">${item.active ? '✅ Ativo' : '⛔ Inativo'}</span>
                <div class="item-actions">
                  <button onclick="openItemModal(${item.id})">✏️ Editar</button>
                  <button onclick="deleteItem(${item.id})">🗑️</button>
                </div>
              </div>
            </div>
          </div>`; }).join('')
        : '<p style="color:#8b949e;padding:40px">Nenhum item nesta categoria.</p>';
    }

    async function openItemModal(id) {
      editingItemId = id || null;
      pendingExtras = [];
      document.getElementById('item-modal-title').textContent = id ? 'Editar Item' : 'Novo Item';
      document.getElementById('item-name').value = '';
      document.getElementById('item-desc').value = '';
      document.getElementById('item-price').value = '';
      document.getElementById('item-active').value = '1';
      document.getElementById('extras-list').innerHTML = '';
      setDaysChecked([]);
      if (id) {
        const res = await fetch(`/api/admin/items?category_id=${currentCatId}`, { headers: h() });
        const items = await res.json();
        const item = items.find(i => i.id == id);
        if (item) {
          document.getElementById('item-name').value = item.name;
          document.getElementById('item-desc').value = item.description || '';
          document.getElementById('item-price').value = item.price;
          document.getElementById('item-active').value = item.active;
          setDaysChecked(JSON.parse(item.available_days || '[]'));
        }
        const extRes = await fetch(`/api/admin/items/${id}/extras`, { headers: h() });
        const extras = await extRes.json();
        extras.forEach(e => { pendingExtras.push({ id: e.id, name: e.name, price: e.price, existing: true }); });
        renderExtras();
      }
      document.getElementById('item-modal').classList.add('open');
    }

    function closeItemModal() { document.getElementById('item-modal').classList.remove('open'); }

    function addExtra() {
      const name = document.getElementById('extra-name').value.trim();
      const price = parseFloat(document.getElementById('extra-price').value);
      if (!name || isNaN(price)) return;
      pendingExtras.push({ name, price, existing: false });
      document.getElementById('extra-name').value = '';
      document.getElementById('extra-price').value = '';
      renderExtras();
    }

    function renderExtras() {
      document.getElementById('extras-list').innerHTML = pendingExtras.map((e, i) => `
        <div class="extra-row">
          <span>${e.name} — ${fmt(e.price)}</span>
          <button onclick="removeExtra(${i})">✕</button>
        </div>`).join('');
    }

    async function removeExtra(i) {
      const e = pendingExtras[i];
      if (e.existing && e.id) await fetch(`/api/admin/extras/${e.id}`, { method: 'DELETE', headers: h() });
      pendingExtras.splice(i, 1);
      renderExtras();
    }

    async function saveItem() {
      const formData = new FormData();
      formData.append('category_id', currentCatId);
      formData.append('name', document.getElementById('item-name').value);
      formData.append('description', document.getElementById('item-desc').value);
      formData.append('price', document.getElementById('item-price').value);
      formData.append('active', document.getElementById('item-active').value);
      formData.append('available_days', JSON.stringify(getDaysChecked()));
      const imgFile = document.getElementById('item-image').files[0];
      if (imgFile) formData.append('image', imgFile);

      let itemId = editingItemId;
      if (editingItemId) {
        await fetch(`/api/admin/items/${editingItemId}`, { method: 'PUT', headers: h(true), body: formData });
      } else {
        const res = await fetch('/api/admin/items', { method: 'POST', headers: h(true), body: formData });
        const data = await res.json();
        itemId = data.id;
      }

      for (const e of pendingExtras) {
        if (!e.existing) {
          await fetch(`/api/admin/items/${itemId}/extras`, { method: 'POST', headers: h(), body: JSON.stringify({ name: e.name, price: e.price }) });
        }
      }

      closeItemModal();
      selectCat(currentCatId, document.getElementById('cat-title').textContent);
    }

    async function deleteItem(id) {
      if (!confirm('Excluir este item?')) return;
      await fetch(`/api/admin/items/${id}`, { method: 'DELETE', headers: h() });
      selectCat(currentCatId, document.getElementById('cat-title').textContent);
    }

    function openCatModal() { document.getElementById('cat-modal').classList.add('open'); }

    async function saveCategory() {
      const name = document.getElementById('cat-name').value;
      const emoji = document.getElementById('cat-emoji').value;
      const sort_order = parseInt(document.getElementById('cat-order').value) || 0;
      await fetch('/api/admin/categories', { method: 'POST', headers: h(), body: JSON.stringify({ name, emoji, sort_order }) });
      document.getElementById('cat-modal').classList.remove('open');
      loadCategories();
    }

    async function deleteCat(id) {
      if (!confirm('Excluir esta categoria e todos os seus itens?')) return;
      await fetch(`/api/admin/categories/${id}`, { method: 'DELETE', headers: h() });
      if (currentCatId == id) { currentCatId = null; document.getElementById('items-grid').innerHTML = ''; document.getElementById('btn-new-item').style.display = 'none'; }
      loadCategories();
    }

    function logout() { localStorage.removeItem('admin_token'); location.href = '/'; }

    loadCategories();
  </script>
</body>
</html>
